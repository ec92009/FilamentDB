<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#102452"/>
      <stop offset="100%" stop-color="#071634"/>
    </linearGradient>
    <linearGradient id="barPurple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b980ff"/>
      <stop offset="100%" stop-color="#6f36ff"/>
    </linearGradient>
    <linearGradient id="barCyan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8dfaff"/>
      <stop offset="100%" stop-color="#28d6ff"/>
    </linearGradient>
    <linearGradient id="barPink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff88f4"/>
      <stop offset="100%" stop-color="#ca39ff"/>
    </linearGradient>
    <linearGradient id="barGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe7a0"/>
      <stop offset="100%" stop-color="#f3b33b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#020916" flood-opacity="0.42"/>
    </filter>
    <filter id="glowPurple" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#aa72ff" flood-opacity="0.8"/>
    </filter>
    <filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#58ebff" flood-opacity="0.82"/>
    </filter>
    <filter id="glowPink" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#f07dff" flood-opacity="0.78"/>
    </filter>
    <filter id="glowGold" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#ffd67a" flood-opacity="0.76"/>
    </filter>
    <style>
      .stroke { stroke: #081631; stroke-width: 18; stroke-linejoin: round; stroke-linecap: round; }
      .thread { fill: none; stroke-width: 10; stroke-linecap: round; }
    </style>
  </defs>

  <rect x="92" y="92" width="840" height="840" rx="140" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="106" y="106" width="812" height="812" rx="126" fill="none" stroke="#17376d" stroke-width="10" opacity="0.7"/>

  <g transform="translate(180 182)">
    <rect class="stroke" x="26" y="80" width="64" height="440" rx="20" fill="url(#barPurple)" filter="url(#glowPurple)"/>
    <rect class="stroke" x="138" y="34" width="70" height="530" rx="20" fill="url(#barCyan)" filter="url(#glowCyan)"/>
    <rect class="stroke" x="252" y="112" width="54" height="370" rx="18" fill="url(#barPink)" filter="url(#glowPink)"/>
    <rect class="stroke" x="362" y="20" width="66" height="548" rx="20" fill="url(#barGold)" filter="url(#glowGold)"/>
    <rect class="stroke" x="474" y="92" width="62" height="426" rx="18" fill="url(#barCyan)" filter="url(#glowCyan)"/>
    <rect class="stroke" x="586" y="44" width="62" height="518" rx="20" fill="url(#barPurple)" filter="url(#glowPurple)"/>

    <g transform="translate(188 114)">
      <path class="stroke" d="M70 10 H218 C250 10 274 22 284 42 C274 66 250 78 218 78 H70 C40 78 16 66 4 42 C16 22 40 10 70 10 Z" fill="#18294e"/>
      <path class="stroke" d="M70 362 H218 C250 362 274 374 284 394 C274 418 250 430 218 430 H70 C40 430 16 418 4 394 C16 374 40 362 70 362 Z" fill="#18294e"/>
      <path class="stroke" d="M88 78 H200 L216 362 H72 Z" fill="#18294e"/>

      <path class="thread" d="M98 108 L205 82" stroke="#7dddf9"/>
      <path class="thread" d="M102 150 L212 122" stroke="#ffd57a"/>
      <path class="thread" d="M110 190 L216 164" stroke="#f48eff"/>
      <path class="thread" d="M116 232 L218 210" stroke="#ffd57a"/>
      <path class="thread" d="M122 274 L219 250" stroke="#f48eff"/>
      <path class="thread" d="M126 316 L218 292" stroke="#7dddf9"/>
    </g>
  </g>
